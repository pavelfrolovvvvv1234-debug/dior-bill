# /etc/nginx/sites-available/dior-host
# Рефералки dior.host → my.dior.host (HTTP, без SSL — безопасно включать сразу).
# Если dior.host уже на другом сервере — этот конфиг на billing-VPS не нужен.

server {
    listen 80;
    listen [::]:80;
    server_name dior.host www.dior.host;

    # Короткая ссылка: dior.host/r/CODE → биллинг
    location ~ ^/r/([A-Za-z0-9]+)$ {
        return 302 https://my.dior.host/r/$1;
    }

    # ?ref=CODE — cookie на .dior.host через биллинг, возврат на ту же страницу
    location / {
        if ($arg_ref ~ "^[A-Z0-9]{8}$") {
            return 302 https://my.dior.host/api/referral/track?ref=$arg_ref&next=$scheme://$host$request_uri;
        }

        # Статика главной (если лежит на этом сервере)
        root /var/www/dior-marketing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

