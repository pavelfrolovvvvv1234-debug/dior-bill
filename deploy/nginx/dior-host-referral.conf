# /etc/nginx/sites-available/dior-host
# Главный сайт dior.host — прокидывает реферальные ссылки в биллинг.
# После certbot для dior.host подключить: include snippets/dior-host-referral.conf;

server {
    listen 80;
    listen [::]:80;
    server_name dior.host www.dior.host;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dior.host www.dior.host;

    # ssl_certificate     /etc/letsencrypt/live/dior.host/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dior.host/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/dior-marketing;
    index index.html;

    # Короткая ссылка: dior.host/r/CODE → биллинг ставит cookie и ведёт на регистрацию
    location ~ ^/r/([A-Za-z0-9]+)$ {
        return 302 https://my.dior.host/r/$1;
    }

    # ?ref=CODE — биллинг ставит cookie на .dior.host и возвращает на ту же страницу
    # Regex must be quoted — unquoted {8} breaks nginx if parsing.
    location / {
        if ($arg_ref ~ "^[A-Z0-9]{8}$") {
            return 302 https://my.dior.host/api/referral/track?ref=$arg_ref&next=$scheme://$host$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }
}
