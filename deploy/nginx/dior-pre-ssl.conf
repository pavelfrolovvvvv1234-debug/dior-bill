# ВРЕМЕННЫЙ конфиг ТОЛЬКО для выпуска Let's Encrypt.
# Скопировать: sudo cp deploy/nginx/dior-pre-ssl.conf /etc/nginx/sites-available/dior
# После успешного certbot заменить на deploy/nginx/dior.conf (с HTTPS).
#
# Важно: на время выпуска сертификата НЕ должно быть:
# - listen 443 / ssl_certificate
# - return 301 https:// на порту 80
# - других файлов в sites-enabled с тем же server_name

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name my.dior.host;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 200 "my ok\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.dior.host;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 200 "api ok\n";
        add_header Content-Type text/plain;
    }
}
