# Copy to /etc/nginx/sites-available/dior
# ln -sf /etc/nginx/sites-available/dior /etc/nginx/sites-enabled/dior
#
# BEFORE certbot: Cloudflare DNS must be "DNS only" (grey cloud) for
# my.dior.host and api.dior.host so A/AAAA records point to THIS server IP.
# Verify: dig +short api.dior.host A  → your VPS IP (not 104.x / 172.x Cloudflare)
#
# Issue cert (HTTP only — no SSL redirect on port 80 yet):
#   certbot --nginx -d my.dior.host -d api.dior.host
# After success, certbot adds ssl_* lines or use the HTTPS blocks below.

# --- Port 80 (required for Let's Encrypt HTTP-01) ---
server {
    listen 80;
    listen [::]:80;
    server_name my.dior.host api.dior.host;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Customer app (HTTP until cert is issued; then add HTTPS block below)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.dior.host;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

