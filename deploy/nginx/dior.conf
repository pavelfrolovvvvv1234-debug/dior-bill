# /etc/nginx/sites-available/dior
# ln -sf /etc/nginx/sites-available/dior /etc/nginx/sites-enabled/dior
# rm -f /etc/nginx/sites-enabled/default
#
# mkdir -p /var/www/certbot/.well-known/acme-challenge
# nginx -t && systemctl reload nginx
#
# Test (must print "ok" — NOT 301, NOT "Cannot GET"):
#   curl -s http://api.dior.host/.well-known/acme-challenge/test
#   curl -s http://my.dior.host/.well-known/acme-challenge/test
#
# Issue cert (webroot — do NOT redirect port 80 to HTTPS until this succeeds):
#   certbot certonly --webroot -w /var/www/certbot -d my.dior.host -d api.dior.host
#
# Then enable HTTPS blocks at the bottom (or: certbot --nginx ...)

server {
    listen 80;
    listen [::]:80;
    server_name my.dior.host;

    # Must be BEFORE proxy — ^~ stops other locations from stealing the path
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.dior.host;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

