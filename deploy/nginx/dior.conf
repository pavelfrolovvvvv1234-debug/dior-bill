# /etc/nginx/sites-available/dior
#
# 1) Cloudflare: set my.dior.host + api.dior.host to DNS only (grey cloud).
# 2) dig +short api.dior.host A  must return YOUR VPS IP (not Cloudflare).
# 3) mkdir -p /var/www/certbot
# 4) nginx -t && systemctl reload nginx
# 5) certbot --nginx -d my.dior.host -d api.dior.host

server {
    listen 80;
    listen [::]:80;
    server_name my.dior.host;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.dior.host;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
